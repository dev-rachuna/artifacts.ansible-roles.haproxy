---
# Przykład: usługi z localhost wystawione na VIP (eth0)
# Typowy scenariusz - HAProxy nasłuchuje na adresie VIP i przekazuje ruch do lokalnych usług.

- hosts: haproxy_nodes
  roles:
    - role: haproxy
      vars:
        in_haproxy:
          global:
            maxconn: 4096
            log:
              - "/dev/log local0"
              - "/dev/log local1 notice"

          defaults:
            mode: http
            timeout_connect: "5s"
            timeout_client: "50s"
            timeout_server: "50s"
            options:
              - httplog
              - dontlognull
              - forwardfor

          stats:
            enabled: true
            bind: "127.0.0.1:8404"
            uri: "/stats"
            refresh: "30s"

          frontends:
            - name: http-in
              bind: "{{ ansible_facts['default_ipv4']['address'] }}:80"
              mode: http
              default_backend: app_servers
              options:
                - httplog
              extra_lines:
                - "redirect scheme https code 301 if !{ ssl_fc }"

            - name: https-in
              bind: "{{ ansible_facts['default_ipv4']['address'] }}:443 ssl crt /etc/haproxy/certs/site.pem"
              mode: http
              default_backend: app_servers
              options:
                - httplog
              extra_lines:
                - "http-request set-header X-Forwarded-Proto https"

          backends:
            - name: app_servers
              mode: http
              balance: roundrobin
              http_check:
                send: "meth GET uri /health"
                expect: "status 200"
              servers:
                - name: app1
                  address: 127.0.0.1
                  port: 8080
                  params: "check"
